  /api/v1/webhooks:
    get:
      tags:
      - Webhooks
      summary: List webhooks
      description: Returns all registered webhooks. Requires scope `webhooks:manage`.
      operationId: webhooksList
      responses:
        '200':
          description: Webhook list
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: array
                    items:
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          nullable: true
                        url:
                          type: string
                          format: uri
                        secret_prefix:
                          type: string
                          example: whsec_ab12
                        events:
                          type: array
                          items:
                            type: string
                        is_active:
                          type: boolean
                        last_delivered_at:
                          type: string
                          format: date-time
                          nullable: true
                        consecutive_failures:
                          type: integer
                          example: 0
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                      type: object
                type: object
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient scope webhooks:manage or license open_api_advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - BearerAuth: []
    post:
      tags:
      - Webhooks
      summary: Create webhook
      description: Registers an endpoint URL to receive Comdesk events. Payloads are
        sent with an HMAC-SHA256 signature in the `X-Comdesk-Signature` header. Requires
        scope `webhooks:manage` and license `open_api_advanced`.
      operationId: webhooksCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
              - url
              - events
              properties:
                url:
                  type: string
                  format: uri
                  example: https://hooks.example.com/comdesk
                events:
                  type: array
                  items:
                    type: string
                    enum:
                    - call.completed
                    - call.missed
                    - call.started
                    - customer.created
                    - customer.updated
                    - transcription.completed
                    - summary.completed
                  example:
                  - call.completed
                  - call.missed
                filters:
                  properties:
                    call_status:
                      type: array
                      items:
                        type: string
                      example:
                      - missed_call
                      - no_answer
                    project_ids:
                      type: array
                      items:
                        type: integer
                      example:
                      - 456
                      - 789
                  type: object
                  nullable: true
                is_enabled:
                  type: boolean
                  example: true
                label:
                  type: string
                  example: Slack Notification — Missed Calls
              type: object
      responses:
        '201':
          description: Webhook created successfully
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Slack Notification
                        nullable: true
                      url:
                        type: string
                        format: uri
                      secret:
                        description: HMAC secret for X-Comdesk-Signature verification.
                          Only shown on creation.
                        type: string
                        example: whsec_xxx
                      secret_prefix:
                        description: First 12 chars of the secret for identification.
                        type: string
                        example: whsec_ab12
                      events:
                        type: array
                        items:
                          type: string
                      is_active:
                        type: boolean
                      created_at:
                        type: string
                        format: date-time
                      message:
                        type: string
                        example: Store this secret now. It cannot be retrieved later.
                    type: object
                type: object
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient scope webhooks:manage or license open_api_advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid URL or empty events array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - BearerAuth: []
      x-acceptance-criteria:
      - ✅ Client can register a URL endpoint to receive specific events (call.completed,
        call.missed, etc.)
      - ✅ Client can filter events by call_status and project_ids
      - ✅ Payload is delivered with HMAC-SHA256 signature in the X-Comdesk-Signature
        header
      - ✅ Payload includes event_id (UUID v4) and timestamp (Unix epoch) for replay
        protection
      - 🔒 Requires scope webhooks:manage
      - 🔒 Requires license open_api_advanced
