components:
  schemas:
    ErrorResponse:
      required:
      - error
      properties:
        error:
          required:
          - code
          - message
          properties:
            code:
              type: string
              example: invalid_api_key
            message:
              type: string
              example: The provided API key is invalid or has been revoked.
            details:
              example: null
              nullable: true
          type: object
      type: object
    ValidationErrorResponse:
      properties:
        error:
          properties:
            code:
              type: string
              example: validation_error
            message:
              type: string
              example: The given data was invalid.
            details:
              type: object
              example:
                phone_number:
                - The phone number field is required.
          type: object
      type: object
    PaginationMeta:
      properties:
        current_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 50
        total:
          type: integer
          example: 128
        last_page:
          type: integer
          example: 3
      type: object
    SpeechAnalysis:
      properties:
        talk_ratio:
          description: Agent talk ratio (0–1)
          type: number
          format: float
          example: 0.45
        speech_speed:
          description: Speech speed (chars/sec)
          type: number
          format: float
          example: 5.2
        filler_count:
          description: Number of filler words
          type: integer
          example: 3
        silence_ratio:
          description: Silence ratio
          type: number
          format: float
          example: 0.08
        overlap_count:
          description: Number of speech overlaps
          type: integer
          example: 2
        positive_ratio:
          description: Positive sentiment ratio
          type: number
          format: float
          example: 0.72
        question_count:
          description: Number of questions asked
          type: integer
          example: 8
        rally_count:
          description: Number of turn exchanges
          type: integer
          example: 15
      type: object
      nullable: true
    CallHistoryItem:
      properties:
        call_id:
          type: string
          example: call_abc123
        call_type:
          type: string
          example: outbound
          enum:
          - outbound
          - inbound
        status:
          type: string
          example: connected
        phone_number:
          type: string
          example: 09012345678
        caller_number:
          type: string
          example: 0312345678
        staff_id:
          type: integer
          example: 123
        staff_name:
          type: string
          example: Tanaka Taro
        project_id:
          type: integer
          example: 456
        project_name:
          type: string
          example: Sales Project A
        customer_id:
          type: integer
          example: 78901
          nullable: true
        customer_name:
          type: string
          example: Test Corporation
          nullable: true
        started_at:
          type: string
          format: date-time
          example: '2026-03-10T10:00:00+09:00'
        ended_at:
          type: string
          format: date-time
          nullable: true
        duration_seconds:
          type: integer
          example: 330
        memo:
          type: string
          example: Appointment secured
          nullable: true
        recall_at:
          type: string
          format: date-time
          nullable: true
        transcription:
          description: Speech-to-text transcription
          type: string
          nullable: true
        summary:
          description: AI-generated call summary
          type: string
          nullable: true
        speech_analysis:
          oneOf:
          - $ref: '#/components/schemas/SpeechAnalysis'
          nullable: true
        recording_url:
          type: string
          format: uri
          nullable: true
        external_id:
          type: string
          example: SF-LEAD-001
          nullable: true
      type: object
  securitySchemes:
    BearerAuth:
      type: http
      description: API key from the api_keys table. Enter without the 'Bearer ' prefix.
      scheme: bearer
tags:
- name: Calls
  description: Calls
- name: Customers
  description: Customers
- name: IVR
  description: IVR
- name: Reports
  description: Reports
- name: Webhooks
  description: Webhooks
